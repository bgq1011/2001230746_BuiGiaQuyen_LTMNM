<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" id="kw" placeholder="Nhập từ khóa">

    <button onclick="search()">Tìm kiếm</button>
    <ul id="result"></ul>
    <script>
        function search() {
            let q = document.getElementById("kw").value;
            fetch('search.php?q=' + encodeURIComponent(q))
                .then(res => res.json())
                .then(data => {
                    document.getElementById("result").innerHTML = data.map(p => `<li>${p.name} - ${p.price}</li>`).join('');

                });
        }
    </script>
</body>

</html>
